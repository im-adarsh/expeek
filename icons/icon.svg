<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="128" height="128" rx="26" fill="white" opacity="0.04"/>

  <!-- Eye white (almond shape) -->
  <path d="M 14 64 Q 64 18 114 64 Q 64 110 14 64 Z" fill="white"/>

  <!-- Iris -->
  <circle cx="64" cy="64" r="22" fill="url(#iris)"/>

  <!-- Pupil -->
  <circle cx="64" cy="64" r="12" fill="#1e1b4b"/>

  <!-- Primary catchlight -->
  <circle cx="71" cy="56" r="6" fill="white" opacity="0.95"/>

  <!-- Secondary small catchlight -->
  <circle cx="57" cy="71" r="3" fill="white" opacity="0.4"/>

  <!-- Subtle pencil stroke inside pupil — a short diagonal line suggesting drawing -->
  <line x1="60" y1="68" x2="68" y2="60" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>

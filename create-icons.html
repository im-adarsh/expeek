<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excalibox Icon Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #374151;
            margin-bottom: 20px;
        }
        .icon-preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .icon-size {
            text-align: center;
        }
        canvas {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
        .download-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .instructions {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .instructions h3 {
            margin-top: 0;
            color: #374151;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 5px 0;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Excalibox Icon Generator</h1>
        
        <div class="instructions">
            <h3>Instructions</h3>
            <ol>
                <li>Click the "Generate Icons" button below</li>
                <li>Right-click each icon and "Save image as..."</li>
                <li>Save them as <code>icon16.png</code>, <code>icon32.png</code>, etc.</li>
                <li>Place the files in the <code>assets/icons/</code> folder</li>
            </ol>
        </div>

        <button id="generate-btn" class="download-btn" style="font-size: 16px; padding: 12px 24px;">
            Generate Icons
        </button>

        <div class="icon-preview" id="icon-preview">
            <!-- Icons will be generated here -->
        </div>
    </div>

    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            
            // Draw background
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw icon elements
            const padding = size * 0.2;
            const iconSize = size - (padding * 2);
            
            // Draw a simple drawing board icon
            ctx.strokeStyle = 'white';
            ctx.lineWidth = Math.max(1, size * 0.05);
            
            // Board outline
            ctx.strokeRect(padding, padding, iconSize, iconSize);
            
            // Grid lines
            ctx.lineWidth = Math.max(0.5, size * 0.02);
            for (let i = 1; i < 3; i++) {
                const pos = padding + (iconSize / 3) * i;
                ctx.beginPath();
                ctx.moveTo(pos, padding);
                ctx.lineTo(pos, padding + iconSize);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(padding, pos);
                ctx.lineTo(padding + iconSize, pos);
                ctx.stroke();
            }
            
            // Draw icon
            ctx.strokeStyle = 'white';
            ctx.lineWidth = Math.max(1, size * 0.08);
            ctx.beginPath();
            ctx.moveTo(padding + iconSize * 0.3, padding + iconSize * 0.7);
            ctx.lineTo(padding + iconSize * 0.7, padding + iconSize * 0.3);
            ctx.stroke();
            
            return canvas;
        }
        
        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        document.getElementById('generate-btn').addEventListener('click', function() {
            const preview = document.getElementById('icon-preview');
            preview.innerHTML = '';
            
            const sizes = [16, 32, 48, 128];
            
            sizes.forEach(size => {
                const container = document.createElement('div');
                container.className = 'icon-size';
                
                const canvas = generateIcon(size);
                container.appendChild(canvas);
                
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = `Download ${size}x${size}`;
                downloadBtn.onclick = () => downloadCanvas(canvas, `icon${size}.png`);
                container.appendChild(downloadBtn);
                
                preview.appendChild(container);
            });
        });
    </script>
</body>
</html>
